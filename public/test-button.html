<!DOCTYPE html>
<html>
<head>
    <title>Chatbot Button Test</title>
    <style>
        body {
            margin: 0;
            background: #0a0a0a;
            color: white;
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .test-btn {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 56px;
            height: 56px;
            background: #39ff14;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            z-index: 9999;
            font-size: 24px;
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.3);
        }
        .test-btn:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <h1>Chatbot Button Visibility Test</h1>
    <p>If you can see a green button with 💬 in the bottom-right corner, then CSS positioning is working.</p>
    <p>If you see this button but NOT on the main site, there's a JavaScript/React issue.</p>

    <button class="test-btn" onclick="alert('Button is visible and clickable!')">💬</button>
</body>
</html>
